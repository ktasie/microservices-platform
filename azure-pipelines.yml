# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and Push Images
  jobs:
  - job: Build
    displayName: Build and Push
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build and Push Frontend
      inputs:
        containerRegistry: 'dockerHubConnection'
        repository: ktasie/frontend
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/frontend/Dockerfile'
        tags: |
          lastest
          $(Build.BuildId)

    - task: Docker@2
      displayName: Build and Push Gateway
      inputs:
        containerRegistry: 'dockerHubConnection'
        repository: ktasie/gateway
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/gateway/Dockerfile'
        tags: |
          lastest
          $(Build.BuildId)
    - task: Docker@2
      displayName: Build and Push Auth Service
      inputs:
        containerRegistry: 'dockerHubConnection'
        repository: ktasie/auth-service
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/services/auth-service/Dockerfile'
        tags: |
          lastest
          $(Build.BuildId)

    - task: Docker@2
      displayName: Build and Push Comment Service
      inputs:
        containerRegistry: 'dockerHubConnection'
        repository: ktasie/comment-service
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/services/comment-service/Dockerfile'
        tags: |
          lastest
          $(Build.BuildId)
    - task: Docker@2
      displayName: Build and Push LIke Service
      inputs:
        containerRegistry: 'dockerHubConnection'
        repository: ktasie/like-service
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/services/like-service/Dockerfile'
        tags: |
          lastest
          $(Build.BuildId)

    - task: Docker@2
      displayName: Build and Push Photo Service
      inputs:
        containerRegistry: 'dockerHubConnection'
        repository: ktasie/photo-service
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/services/photo-service/Dockerfile'
        tags: |
          lastest
          $(Build.BuildId)