trigger:
  branches:
    include:
      - main
  paths:
    include:
      - services/service-a/**

pool:
  vmImage: node:24.12-alpine

variables:
  serviceName: ca-like
  imageName: ktasie/like-service:latest
  dockerfilePath: services/like-service/Dockerfile
  buildContext: services/like-service
  resourceGroup: rg-photoapp-prod
  containerAppName: ca-like

stages:
- stage: BuildAndPush
  displayName: Build and Push Image
  jobs:
  - job: Build
    steps:
    - checkout: self

    # Docker login to Docker Hub (use a Service Connection if you can)
    - task: Docker@2
      displayName: Login to Docker registry
      inputs:
        command: login
        containerRegistry: 'DockerHubServiceConnection'  # define in ADO project settings

    - task: Docker@2
      displayName: Build and push
      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: $(dockerfilePath)
        buildContext: $(buildContext)
        tags: |
          $(Build.SourceVersion)
          latest

- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: BuildAndPush
  jobs:
  - job: DeployJob
    steps:
    # Azure login via service connection
    - task: AzureCLI@2
      displayName: Update Container App image (new revision)
      inputs:
        azureSubscription: 'AzureServiceConnection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az extension add --name containerapp --upgrade
          az containerapp update \
            -g $(resourceGroup) \
            -n $(containerAppName) \
            --image $(imageName):$(Build.SourceVersion)
