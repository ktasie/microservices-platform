trigger:
  branches:
    include:
      - main
  paths:
    include:
      - services/like-service/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  serviceName: ca-like
  imageName: ktasie/like-service
  dockerfilePath: 'services/like-service/Dockerfile'
  buildContext: services/like-service
  resourceGroup: rg-photoapp-prod
  containerAppName: ca-like

stages:
- stage: BuildAndPush
  displayName: Build and Push Image
  jobs:
  - job: Build
    steps:
    - checkout: self

    # Docker login to Docker Hub (use a Service Connection if you can)
    - task: Docker@2
      displayName: Login to Docker registry
      inputs:
        command: login
        containerRegistry: 'dockerHubConnection'  # define in ADO project settings

    - task: Docker@2
      displayName: Build and push
      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: $(dockerfilePath)
        buildContext: $(buildContext)
        tags: |
          latest


